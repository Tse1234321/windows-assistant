name: Release

# Build and publish the Windows installer when a version tag is pushed.
# Uses the existing electron-builder config in package.json (publishes to the
# GitHub release for the tag). electron-builder needs Windows to produce NSIS.
on:
  push:
    tags: ['v*']

jobs:
  release:
    name: Build & publish Windows installer
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build & publish
        run: npm run release:github
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
