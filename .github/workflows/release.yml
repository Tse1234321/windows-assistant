name: Release

# Build and publish the Windows installer when a version tag is pushed.
# Prefer trusted signing when repository secrets are available. When no
# certificate is configured, publish an explicitly unsigned installer so the
# release remains usable; the workflow output and release notes must disclose
# that status. Explicit package:signed/release:signed commands stay fail-closed.
on:
  push:
    tags: ['v*']

jobs:
  release:
    name: Build & publish Windows installer
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build and publish Windows installer
        shell: pwsh
        run: |
          if ($env:WIN_CSC_LINK -and $env:WIN_CSC_KEY_PASSWORD) {
            Write-Host 'Trusted Windows signing credentials detected; publishing signed installer.'
            npm run release:signed
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
            $notes = 'Windows installer published with the configured trusted signing identity.'
          } else {
            Write-Warning 'Trusted Windows signing credentials are not configured; publishing unsigned installer.'
            npm run release:unsigned
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
            $notes = 'This release contains an unsigned Windows installer because trusted signing credentials were not configured. SmartScreen may display a warning and no publisher reputation is attached.'
          }
          gh release edit $env:GITHUB_REF_NAME --repo $env:GITHUB_REPOSITORY --notes $notes
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
